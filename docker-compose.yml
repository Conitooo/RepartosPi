services:
  db:
    image: postgres:16
    container_name: repartospi-db
    environment:
      POSTGRES_DB: pedidos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pedidos_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./RepartosPiBackend
      dockerfile: Dockerfile
    container_name: repartospi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/pedidos_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "admin"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_PROFILES_ACTIVE: "docker"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./RepartosPiFront
      dockerfile: Dockerfile
    container_name: repartospi-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: